<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazzlix - Spin & Win</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <img src="logo.png" alt="Dazzlix Logo" class="brand-logo">
            </div>
            <h2 class="title">Spin & Win</h2>
            <p class="subtitle">Spin the wheel and win exclusive jewelry discounts!</p>
        </header>

        <main>
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="450" height="450"></canvas>
                <button id="spinBtn" class="spin-btn">
                    <span>Spin</span>
                </button>
            </div>

            <div class="result-overlay" id="resultOverlay">
                <div class="result-modal">
                    <div class="result-icon">
                        <i data-lucide="gift" class="icon"></i>
                    </div>
                    <h2>Congratulations!</h2>
                    <p class="result-text" id="resultText">You won!</p>
                    <button class="close-btn" id="closeBtn">Claim Reward</button>
                </div>
            </div>

            <section class="history-section" id="historyContainer">
                <h3>Spin history</h3>
                <div class="history-list" id="historyList"></div>
            </section>
        </main>

        <footer>
            <p class="company-name">Dazzlix Precious Jewellery</p>
            <p class="footer-tagline">Exquisite Jewelry for Every Occasion</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
